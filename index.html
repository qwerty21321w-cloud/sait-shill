<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Чат — Банк Данных</title>
  <style>
    :root{--bg:#0b0f14;--panel:#0f1720;--accent:#00d28a;--muted:#98a0ab;--bubble:#11161b;--mine:#063;--their:#1b2330}
    *{box-sizing:border-box}
    html,body{height:100%;margin:0;color:#e6eef6;background:var(--bg);font-family:Inter,Segoe UI,Arial,sans-serif}
    .app{height:100vh;display:flex;flex-direction:column}
    .topbar{height:64px;background:linear-gradient(90deg,#0b1015, #0f1720);display:flex;align-items:center;justify-content:space-between;padding:0 16px;border-bottom:1px solid rgba(255,255,255,0.03)}
    .brand{font-weight:700;color:var(--accent)}
    .status{font-size:12px;color:var(--muted)}

    .main{flex:1;display:flex;gap:16px;padding:16px}
    .sidebar{width:280px;background:var(--panel);border-radius:8px;padding:12px;display:flex;flex-direction:column;gap:12px}
    .search{display:flex;gap:8px}
    .search input{flex:1;padding:8px;border-radius:6px;border:1px solid rgba(255,255,255,0.03);background:transparent;color:inherit}
    .conversations{overflow:auto;flex:1}
    .conv{padding:10px;border-radius:8px;margin-bottom:8px;background:rgba(255,255,255,0.01);cursor:pointer}
    .conv .title{font-weight:600}
    .chat{flex:1;display:flex;flex-direction:column;background:linear-gradient(180deg,#071018,#08131a);border-radius:8px;padding:12px}

    .messages{flex:1;overflow:auto;padding:12px;display:flex;flex-direction:column;gap:10px}
    .bubble{max-width:72%;padding:10px 12px;border-radius:12px;color:#e6eef6;font-size:14px;line-height:1.35}
    .bubble.their{align-self:flex-start;background:var(--their);border-top-left-radius:4px}
    .bubble.mine{align-self:flex-end;background:linear-gradient(90deg,#04683b,#033);border-top-right-radius:4px}
    .meta{font-size:11px;color:var(--muted);margin-top:6px}

    .composer{display:flex;gap:8px;padding:12px;border-top:1px solid rgba(255,255,255,0.03);align-items:center}
    .composer input[type=text]{flex:1;padding:12px;border-radius:999px;border:1px solid rgba(255,255,255,0.04);background:transparent;color:inherit}
    .btn{padding:10px 14px;border-radius:999px;background:var(--accent);color:#012;cursor:pointer;border:none}
    .file-label{padding:8px;border-radius:8px;background:rgba(255,255,255,0.02);cursor:pointer}

    .small{font-size:12px;color:var(--muted)}
    .message-file{margin-top:8px;display:block;max-width:220px;border-radius:6px}
  </style>
</head>
<body>
  <div class="app">
    <div class="topbar">
      <div class="brand">Банк Данных — Чат</div>
      <div class="status" id="statusIndicator">[ ПОДКЛЮЧЕНИЕ... ]</div>
    </div>

    <div class="main">
      <div class="sidebar">
        <div class="search"><input id="searchConv" placeholder="Поиск..."/></div>
        <div class="conversations" id="conversations"></div>
        <div class="small">Открыть репозиторий: GitHub Pages</div>
      </div>

      <div style="flex:1;display:flex;flex-direction:column">
        <div class="chat">
          <div class="messages" id="messages"></div>

          <div class="composer">
            <label class="file-label">
              📎 <input id="fileInput" type="file" style="display:none" />
            </label>
            <input id="messageInput" type="text" placeholder="Напишите сообщение... (Ctrl+Enter отправить)" />
            <button id="sendBtn" class="btn">Отправить</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/10.5.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.5.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.5.0/firebase-database-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.5.0/firebase-storage-compat.js"></script>

  <script>
    // Конфиг Firebase
    const firebaseConfig = {
      apiKey: "AIzaSyCszNTU9feb83GToovE3HuHdW9dsn5lYlc",
      authDomain: "sait-e0d07.firebaseapp.com",
      databaseURL: "https://sait-e0d07-default-rtdb.europe-west1.firebasedatabase.app",
      projectId: "sait-e0d07",
      storageBucket: "sait-e0d07.appspot.com",
      messagingSenderId: "166005592540",
      appId: "1:166005592540:web:c3d4899cc22a6bf29e7f19"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.database();
    const storage = firebase.storage();

    const messagesDiv = document.getElementById('messages');
    const sendBtn = document.getElementById('sendBtn');
    const messageInput = document.getElementById('messageInput');
    const fileInput = document.getElementById('fileInput');
    const statusIndicator = document.getElementById('statusIndicator');

    let currentUserId = null;

    function updateStatus(connected){
      statusIndicator.textContent = connected? '[ ✓ ОНЛАЙН ]' : '[ ✗ ОФЛАЙН ]';
    }

    function formatDate(ts){ const d=new Date(ts); return `${d.getHours().toString().padStart(2,'0')}:${d.getMinutes().toString().padStart(2,'0')}` }

    function escapeHtml(s){ return (s||'').replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'})[c]) }

    function renderMessage(msg){
      const el = document.createElement('div');
      const mine = msg.userId===currentUserId;
      el.className = 'bubble '+(mine? 'mine':'their');
      el.innerHTML = `<div>${escapeHtml(msg.text||'')}</div>`;
      if(msg.fileUrl){
        if(/\.(jpe?g|png|gif|webp)$/i.test(msg.fileName||'')){
          el.innerHTML += `<img src="${msg.fileUrl}" class="message-file"/>`;
        } else {
          el.innerHTML += `<a href="${msg.fileUrl}" target="_blank" class="small">📥 ${escapeHtml(msg.fileName||'Файл')}</a>`;
        }
      }
      el.innerHTML += `<div class="meta">${escapeHtml(msg.device||'')} • ${formatDate(msg.timestamp)}</div>`;
      messagesDiv.appendChild(el);
      messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }

    function listenMessages(){
      db.ref('messages').orderByChild('timestamp').limitToLast(200).on('value', snap=>{
        messagesDiv.innerHTML='';
        snap.forEach(ch=>{ renderMessage(ch.val()); })
        updateStatus(true);
      }, err=>{ console.error(err); updateStatus(false); });
    }

    function uploadFile(file){
      const ref = storage.ref(`chat_uploads/${Date.now()}_${file.name}`);
      return new Promise((resolve, reject) => {
        const uploadTask = ref.put(file);
        uploadTask.on('state_changed',
          () => {},
          (err) => reject(err),
          () => uploadTask.snapshot.ref.getDownloadURL().then(resolve).catch(reject)
        );
      });
    }

    async function sendMessage(){
      const text = messageInput.value.trim();
      const file = fileInput.files[0];
      if(!text && !file) return;
      sendBtn.disabled=true;
      const msg = { text, timestamp: Date.now(), userId: currentUserId, device: navigator.userAgent };
      try{
        if(file){
          const url = await uploadFile(file);
          msg.fileUrl = url; msg.fileName = file.name;
        }
        db.ref('messages').push(msg);
        messageInput.value=''; fileInput.value='';
      }catch(e){ console.error(e); alert('Ошибка отправки: '+e.message) }
      sendBtn.disabled=false;
    }

    sendBtn.addEventListener('click', sendMessage);
    messageInput.addEventListener('keydown', e=>{ if(e.ctrlKey&&e.key==='Enter') sendMessage(); });

    auth.onAuthStateChanged(user=>{
      if(user){ currentUserId = user.uid; listenMessages(); }
      else auth.signInAnonymously().catch(err=>console.error(err));
    });
  </script>
</body>
</html>
